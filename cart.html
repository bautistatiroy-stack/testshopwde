<!DOCTYPE html>
<html>

<head>
    <title>Modern Cart</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->
    <div class="topbar">

        <h2>🛒 Shopping Cart</h2>

        <div>
            Ready for Checkout ✅
        </div>

    </div>

    <!-- CUSTOMER INFO -->
    <div class="info-box" id="info"></div>

    <!-- CART ITEMS -->
    <div class="cart-grid" id="cart"></div>

    <!-- TOTAL -->
    <div class="total-box">

        <h3>
            Total: ₱<span id="total">0</span>
        </h3>

        <button class="checkout-btn" onclick="goCheckout()">
            Checkout
        </button>
        <button class="checkout-btn" onclick="goShop()">
            back
 </button>
    </div>

    <script>
        function goShop() {
            window.location.href = "shop.html";
        }

        let products = JSON.parse(localStorage.getItem("products")) || [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let qty = JSON.parse(localStorage.getItem("qty")) || [];

        function save() {
            localStorage.setItem("cart", JSON.stringify(cart));
            localStorage.setItem("qty", JSON.stringify(qty));
        }

        function render() {

            let html = "";
            let total = 0;

            let cartItems = [];

            products.forEach((p, i) => {

                if (cart[i]) {

                    if (!qty[i] || qty[i] < 1) qty[i] = 1;

                    let subtotal = Number(p.price) * Number(qty[i]);
                    total += subtotal;

                    cartItems.push({
                        name: p.name,
                        price: p.price,
                        qty: qty[i],
                        subtotal: subtotal
                    });

                    html += `
            <div class="card">
                <img src="${p.img}">

                <div class="content">
                    <div class="name">${p.name}</div>
                    <div class="price">₱${p.price}</div>

                    <div class="qty-controls">
                        <button onclick="minus(${i})">-</button>
                        <span>${qty[i]}</span>
                        <button onclick="plus(${i})">+</button>
                    </div>

                    <div class="subtotal">
                        Subtotal: ₱${subtotal}
                    </div>

                    <button class="remove" onclick="removeItem(${i})">
                        Remove
                    </button>
                </div>
            </div>
            `;
                }
            });

            if (!html) {
                html = `
        <div class="empty">
            <h2>🛒 Your cart is empty</h2>
        </div>`;
            }

            document.getElementById("cart").innerHTML = html;
            document.getElementById("total").innerText = total;

            localStorage.setItem("total", total);
            localStorage.setItem("cartItems", JSON.stringify(cartItems));
        }

        function plus(i) {
            qty[i] = (qty[i] || 1) + 1;
            save();
            render();
        }

        function minus(i) {
            if (qty[i] > 1) {
                qty[i]--;
                save();
                render();
            }
        }

        function removeItem(i) {
            cart[i] = false;
            qty[i] = 0;
            save();
            render();
        }

        function goCheckout() {
            if (Number(document.getElementById("total").innerText) <= 0) {
                alert("Cart is empty!");
                return;
            }
            window.location.href = "checkout.html";
        }

        render();
    </script>

</body>

</html>
