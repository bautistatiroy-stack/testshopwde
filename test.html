<!DOCTYPE html>
<html>

<head>
    <title>Food Order System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }
        
        header {
            background: #0077ff;
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .container {
            padding: 15px;
        }
        
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            padding: 10px 15px;
            border: none;
            background: #0077ff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #005fd1;
        }
        
        .closed {
            background: red;
            color: white;
            padding: 10px;
            text-align: center;
            display: none;
        }
        
        .order {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .search-box input {
            flex: 1;
        }
    </style>
</head>

<body>

    <header>
        Food Ordering System
    </header>

    <div id="shopStatus" class="closed">
        🚫 Shop is CLOSED
    </div>

    <div class="container">

        <!-- ORDER FORM -->
        <div class="card">
            <h3>Place Order</h3>

            <input type="text" id="name" placeholder="Name">
            <input type="text" id="phone" placeholder="Phone">
            <textarea id="address" placeholder="Address"></textarea>
            <input type="text" id="delivery" placeholder="Delivery Type (Pickup/Delivery)">
            <textarea id="items" placeholder="Items (e.g. Burger x2, Coke x1)"></textarea>
            <input type="number" id="total" placeholder="Total Price">

            <button onclick="sendOrder()">Submit Order</button>
        </div>

        <!-- SEARCH -->
        <div class="card">
            <h3>Search Orders</h3>

            <div class="search-box">
                <input type="text" id="searchName" placeholder="Search by name..." onkeyup="filterOrders()">
                <input type="date" id="searchDate" onchange="filterOrders()">
            </div>

            <button onclick="loadOrders()">Refresh Orders</button>
        </div>

        <!-- ORDERS LIST -->
        <div class="card">
            <h3>All Orders</h3>
            <div id="orders"></div>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLfeL8z97YQYw0NkfNAdpGqcKdT2C6D4Kcsl5DndEr9e3Z-kRD-aYscJzbMp5PWna0Ag/exec";

        let shopOpen = true;
        let allOrders = [];

        function toggleShop() {
            shopOpen = !shopOpen;
            document.getElementById("shopStatus").style.display = shopOpen ? "none" : "block";
        }

        // SEND ORDER
        function sendOrder() {

            if (!shopOpen) {
                alert("Shop is closed!");
                return;
            }

            let formData = new URLSearchParams();
            formData.append("name", document.getElementById("name").value);
            formData.append("phone", document.getElementById("phone").value);
            formData.append("address", document.getElementById("address").value);
            formData.append("delivery", document.getElementById("delivery").value);
            formData.append("items", document.getElementById("items").value);
            formData.append("total", document.getElementById("total").value);

            fetch(SCRIPT_URL, {
                    method: "POST",
                    body: formData
                })
                .then(res => res.json())
                .then(() => {
                    alert("Order placed successfully!");
                    loadOrders();
                })
                .catch(err => alert("Error: " + err));
        }

        // LOAD ORDERS
        function loadOrders() {
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    allOrders = data.records.reverse();
                    renderOrders(allOrders);
                });
        }

        // FILTER
        function filterOrders() {
            let nameSearch = document.getElementById("searchName").value.toLowerCase();
            let dateSearch = document.getElementById("searchDate").value;

            let filtered = allOrders.filter(o => {
                let matchName = o.name.toLowerCase().includes(nameSearch);
                let matchDate = dateSearch ? o.date === dateSearch : true;
                return matchName && matchDate;
            });

            renderOrders(filtered);
        }

        // RENDER
        function renderOrders(list) {
            let html = "";

            list.forEach(o => {
                html += `
      <div class="order">
        <b>${o.name}</b><br>
        📞 ${o.phone}<br>
        📍 ${o.address}<br>
        🚚 ${o.delivery}<br>
        🍔 ${o.items}<br>
        💰 ${o.total}<br>
        🕒 ${o.date} ${o.time}
      </div>
    `;
            });

            document.getElementById("orders").innerHTML = html;
        }

        // AUTO LOAD
        loadOrders();
    </script>

</body>

</html>
